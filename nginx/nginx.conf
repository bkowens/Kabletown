upstream auth_service {
    server auth-service:8001;
}

upstream user_service {
    server user-service:8002;
}

upstream library_service {
    server library-service:8003;
}

upstream playstate_service {
    server playstate-service:8004;
}

upstream media_service {
    server media-service:8005;
}

upstream stream_service {
    server stream-service:8006;
}

upstream session_service {
    server session-service:8007;
}

upstream metadata_service {
    server metadata-service:8008;
}

upstream content_service {
    server content-service:8009;
}

upstream system_service {
    server system-service:8010;
}

upstream transcode_service {
    server transcode-service:8011;
}

upstream collection_service {
    server collection-service:8012;
}

upstream playlist_service {
    server playlist-service:8013;
}

upstream notification_service {
    server notification-service:8014;
}

upstream plugin_service {
    server plugin-service:8015;
}

upstream search_service {
    server search-service:8016;
}

upstream item_service {
    server item-service:8017;
}

upstream streaming_service {
    server streaming-service:8018;
}

server {
    listen 8080;
    server_name localhost;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Auth service routes (must be before /Users to take longest-prefix precedence)
    location /Auth { proxy_pass http://auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Startup { proxy_pass http://auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /QuickConnect { proxy_pass http://auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Auth sub-routes under /Users (longest prefix wins over /Users below)
    location /Users/AuthenticateByName { proxy_pass http://auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Users/ForgotPassword { proxy_pass http://auth_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Session service (8007)
    location /Sessions { proxy_pass http://session_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Devices { proxy_pass http://session_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /SyncPlay { proxy_pass http://session_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # User service (8002)
    location /Users { proxy_pass http://user_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /DisplayPreferences { proxy_pass http://user_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Library service (8003)
    location /Items { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /UserLibrary { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
    location /UserViews { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Library { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Genres { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Studios { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Persons { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Years { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Artists { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Albums { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Trailers { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Suggestions { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Filters { proxy_pass http://library_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Playstate service (8004)
    location /Playstate { proxy_pass http://playstate_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Media service (8005)
    location /Images { proxy_pass http://media_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /MediaInfo { proxy_pass http://media_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Lyrics { proxy_pass http://media_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Attachments { proxy_pass http://media_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Subtitles { proxy_pass http://media_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Stream service (8006) — HLS and progressive video
    location /Videos { proxy_pass http://stream_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 0; proxy_buffering off; }
    location /Hls { proxy_pass http://stream_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 0; proxy_buffering off; }
    location /Audio { proxy_pass http://stream_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 0; proxy_buffering off; }

    # Metadata service (8008)
    location /Metadata { proxy_pass http://metadata_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /ScheduledTasks { proxy_pass http://metadata_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Content service (8009)
    location /Movies { proxy_pass http://content_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /TvShows { proxy_pass http://content_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Similar { proxy_pass http://content_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Channels { proxy_pass http://content_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /LiveTv { proxy_pass http://content_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /InstantMix { proxy_pass http://content_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # System service (8010)
    location /System { proxy_pass http://system_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Configuration { proxy_pass http://system_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Dashboard { proxy_pass http://system_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Branding { proxy_pass http://system_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Environment { proxy_pass http://system_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Localization { proxy_pass http://system_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /ClientLog { proxy_pass http://system_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /ActivityLog { proxy_pass http://system_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Transcode service (8011)
    location /transcodes { proxy_pass http://transcode_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 0; }
    location /Transcoding { proxy_pass http://transcode_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 0; }

    # Collection service (8012)
    location /Collections { proxy_pass http://collection_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /BoxSets { proxy_pass http://collection_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Playlist service (8013)
    location /Playlists { proxy_pass http://playlist_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Notification service (8014)
    location /Notifications { proxy_pass http://notification_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 3600s; }
    location /Sse { proxy_pass http://notification_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 3600s; }

    # Plugin service (8015)
    location /Plugins { proxy_pass http://plugin_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }
    location /Packages { proxy_pass http://plugin_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    # Search service (8016)
    location /Search { proxy_pass http://search_service; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 60s; }

    location / { return 404 '{"error": "Not found"}'; add_header Content-Type application/json; }
}
