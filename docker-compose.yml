version: '3.8'

services:
  # Nginx API Gateway
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: kabletown-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - library-service
      - playstate-service
      - media-service
      - stream-service
      - session-service
      - metadata-service
      - content-service
      - system-service
      - search-service
      - transcode-service
      - collection-service
      - playlist-service
      - notification-service
      - plugin-service
    networks:
      - kabletown
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: kabletown-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kabletown
      MYSQL_USER: kabletown
      MYSQL_PASSWORD: kabletown
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - kabletown
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Auth Service (8001)
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: kabletown-auth
    environment:
      - PORT=8001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # User Service (8002)
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: kabletown-user
    environment:
      - PORT=8002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Library Service (8003)
  library-service:
    build:
      context: ./library-service
      dockerfile: Dockerfile
    container_name: kabletown-library
    environment:
      - PORT=8003
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Playstate Service (8004)
  playstate-service:
    build:
      context: ./playstate-service
      dockerfile: Dockerfile
    container_name: kabletown-playstate
    environment:
      - PORT=8004
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Media Service (8005)
  media-service:
    build:
      context: ./media-service
      dockerfile: Dockerfile
    container_name: kabletown-media
    environment:
      - PORT=8005
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Stream Service (8006)
  stream-service:
    build:
      context: ./stream-service
      dockerfile: Dockerfile
    container_name: kabletown-stream
    environment:
      - PORT=8006
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Session Service (8007)
  session-service:
    build:
      context: ./session-service
      dockerfile: Dockerfile
    container_name: kabletown-session
    environment:
      - PORT=8007
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Metadata Service (8008)
  metadata-service:
    build:
      context: ./metadata-service
      dockerfile: Dockerfile
    container_name: kabletown-metadata
    environment:
      - PORT=8008
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Content Service (8009)
  content-service:
    build:
      context: ./content-service
      dockerfile: Dockerfile
    container_name: kabletown-content
    environment:
      - PORT=8009
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # System Service (8010)
  system-service:
    build:
      context: ./system-service
      dockerfile: Dockerfile
    container_name: kabletown-system
    environment:
      - PORT=8010
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Transcode Service (8011)
  transcode-service:
    build:
      context: ./transcode-service
      dockerfile: Dockerfile
    container_name: kabletown-transcode
    environment:
      - PORT=8011
      - TRANCODE_PORT=8011
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    volumes:
      - transcoded:/tmp/transcoding
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Collection Service (8012)
  collection-service:
    build:
      context: ./collection-service
      dockerfile: Dockerfile
    container_name: kabletown-collection
    environment:
      - PORT=8012
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Playlist Service (8013)
  playlist-service:
    build:
      context: ./playlist-service
      dockerfile: Dockerfile
    container_name: kabletown-playlist
    environment:
      - PORT=8013
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Notification Service (8014)
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: kabletown-notification
    environment:
      - PORT=8014
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    networks:
      - kabletown
    restart: unless-stopped

  # Plugin Service (8015)
  plugin-service:
    build:
      context: ./plugin-service
      dockerfile: Dockerfile
    container_name: kabletown-plugin
    environment:
      - PORT=8015
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    networks:
      - kabletown
    restart: unless-stopped

  # Search Service (8016)
  search-service:
    build:
      context: ./search-service
      dockerfile: Dockerfile
    container_name: kabletown-search
    environment:
      - PORT=8016
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

volumes:
  mysql_data:
  transcoded:

networks:
  kabletown:
    driver: bridge
