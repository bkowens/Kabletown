version: '3.8'

services:
  # Nginx API Gateway
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: kabletown-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - library-service
      - playstate-service
      - media-service
      - stream-service
      - session-service
      - metadata-service
      - content-service
      - system-service
      - search-service
      - transcode-service
      - collection-service
      - playlist-service
      - notification-service
      - plugin-service
      - item-service
      - streaming-service
    networks:
      - kabletown
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: kabletown-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kabletown
      MYSQL_USER: kabletown
      MYSQL_PASSWORD: kabletown
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - kabletown
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Auth Service (8001)
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: kabletown-auth
    environment:
      - SERVICE_PORT=8001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASSWORD=kabletown
      - DB_NAME=kabletown
      - SERVER_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # User Service (8002)
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: kabletown-user
    environment:
      - SERVICE_PORT=8002
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASSWORD=kabletown
      - DB_NAME=kabletown
      - SERVER_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Library Service (8003)
  library-service:
    build:
      context: .
      dockerfile: library-service/Dockerfile
    container_name: kabletown-library
    environment:
      - SERVICE_PORT=8003
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASSWORD=kabletown
      - DB_NAME=kabletown
      - SERVER_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Playstate Service (8004)
  playstate-service:
    build:
      context: .
      dockerfile: playstate-service/Dockerfile
    container_name: kabletown-playstate
    environment:
      - PLAYSTATE_SERVICE_PORT=8004
      - DB_DSN=kabletown:kabletown@tcp(mysql:3306)/kabletown?parseTime=true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Media Service (8005)
  media-service:
    build:
      context: .
      dockerfile: media-service/Dockerfile
    container_name: kabletown-media
    environment:
      - SERVICE_PORT=8005
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASSWORD=kabletown
      - DB_NAME=kabletown
      - SERVER_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Stream Service (8006)
  stream-service:
    build:
      context: .
      dockerfile: stream-service/Dockerfile
    container_name: kabletown-stream
    environment:
      - SERVICE_PORT=8006
      - DB_DSN=kabletown:kabletown@tcp(mysql:3306)/kabletown?parseTime=true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Session Service (8007)
  session-service:
    build:
      context: .
      dockerfile: session-service/Dockerfile
    container_name: kabletown-session
    environment:
      - SERVICE_PORT=8007
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASSWORD=kabletown
      - DB_NAME=kabletown
      - SERVER_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Metadata Service (8008)
  metadata-service:
    build:
      context: .
      dockerfile: metadata-service/Dockerfile
    container_name: kabletown-metadata
    environment:
      - SERVICE_PORT=8008
      - DB_DSN=kabletown:kabletown@tcp(mysql:3306)/kabletown?parseTime=true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Content Service (8009)
  content-service:
    build:
      context: .
      dockerfile: content-service/Dockerfile
    container_name: kabletown-content
    environment:
      - SERVICE_PORT=8009
      - DB_DSN=kabletown:kabletown@tcp(mysql:3306)/kabletown?parseTime=true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # System Service (8010)
  system-service:
    build:
      context: .
      dockerfile: system-service/Dockerfile
    container_name: kabletown-system
    environment:
      - SERVICE_PORT=8010
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASSWORD=kabletown
      - DB_NAME=kabletown
      - SERVER_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Transcode Service (8011)
  transcode-service:
    build:
      context: .
      dockerfile: transcode-service/Dockerfile
    container_name: kabletown-transcode
    environment:
      - PORT=8011
      - TRANSCODE_PORT=8011
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASS=kabletown
      - DB_NAME=kabletown
    volumes:
      - transcoded:/tmp/transcoding
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Collection Service (8012)
  collection-service:
    build:
      context: .
      dockerfile: collection-service/Dockerfile
    container_name: kabletown-collection
    environment:
      - SERVICE_PORT=8012
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASSWORD=kabletown
      - DB_NAME=kabletown
      - SERVER_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Playlist Service (8013)
  playlist-service:
    build:
      context: .
      dockerfile: playlist-service/Dockerfile
    container_name: kabletown-playlist
    environment:
      - SERVICE_PORT=8013
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASSWORD=kabletown
      - DB_NAME=kabletown
      - SERVER_ID=00000000-0000-0000-0000-000000000001
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Notification Service (8014)
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: kabletown-notification
    environment:
      - SERVICE_PORT=8014
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=kabletown
      - DB_PASSWORD=kabletown
      - DB_NAME=kabletown
      - SERVER_ID=00000000-0000-0000-0000-000000000001
    networks:
      - kabletown
    restart: unless-stopped

  # Plugin Service (8015)
  plugin-service:
    build:
      context: .
      dockerfile: plugin-service/Dockerfile
    container_name: kabletown-plugin
    environment:
      - SERVICE_PORT=8015
    networks:
      - kabletown
    restart: unless-stopped

  # Search Service (8016)
  search-service:
    build:
      context: .
      dockerfile: search-service/Dockerfile
    container_name: kabletown-search
    environment:
      - SERVICE_PORT=8016
    networks:
      - kabletown
    restart: unless-stopped

  # Item Service (8017)
  item-service:
    build:
      context: .
      dockerfile: item-service/Dockerfile
    container_name: kabletown-item
    environment:
      - ITEM_SERVICE_PORT=8017
      - DB_DSN=kabletown:kabletown@tcp(mysql:3306)/kabletown?parseTime=true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

  # Streaming Service (8018)
  streaming-service:
    build:
      context: .
      dockerfile: streaming-service/Dockerfile
    container_name: kabletown-streaming
    environment:
      - STREAMING_SERVICE_PORT=8018
      - DB_DSN=kabletown:kabletown@tcp(mysql:3306)/kabletown?parseTime=true
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kabletown
    restart: unless-stopped

volumes:
  mysql_data:
  transcoded:

networks:
  kabletown:
    driver: bridge
