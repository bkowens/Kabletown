# Main server block for JellyFinhanced Go Microservices Gateway

# Upstream definitions (to be uncommented as services are deployed)
upstream auth_service { server auth-service:8001; }
upstream user_service { server user-service:8002; fail_timeout=0; }  # TODO: implement
upstream library_service { server library-service:8003; fail_timeout=0; }  # TODO: implement
upstream media_service { server media-service:8005; fail_timeout=0; }  # TODO: implement
upstream stream_service { server stream-service:8006; fail_timeout=0; }  # TODO: implement
upstream playstate_service { server playstate-service:8004; fail_timeout=0; }  # TODO: implement
upstream session_service { server session-service:8008; fail_timeout=0; }  # TODO: implement
upstream content_service { server content-service:8009; fail_timeout=0; }  # TODO: implement
upstream metadata_service { server metadata-service:8010; fail_timeout=0; }  # TODO: implement
upstream system_service { server system-service:8011; fail_timeout=0; }  # TODO: implement

# Fallback to C# server for unimplemented endpoints (during transition)
upstream jellyfin_csharp { server 127.0.0.1:8096; }

server {
    listen 8096;
    server_name _;
    
    # Compatibility headers
    add_header X-Application-Version "10.10.0" always;
    add_header X-MediaBrowser-Server-Id "go-gateway" always;
    
    # Timeouts
    proxy_connect_timeout 15s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    # Logging
    access_log /var/log/nginx/jellyfin_access.log;
    error_log /var/log/nginx/jellyfin_error.log;
    
    # Health check (gateway level)
    location /healthz {
        return 200 '{"status": "ok", "service": "gateway"}';
        add_header Content-Type application/json;
    }
    
    # === AUTH SERVICE (COMPLETE) ===
    
    # Public users
    location /Users/Public {
        proxy_pass http://auth_service/Users/Public;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Authentication endpoints
    location /Users/AuthenticateByName {
        proxy_pass http://auth_service/Users/AuthenticateByName;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass_header X-Application-Version;
        proxy_pass_header X-MediaBrowser-Server-Id;
    }
    
    location /Sessions/AuthenticateByName {
        proxy_pass http://auth_service/Users/AuthenticateByName;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Quick Connect
    location /QuickConnect/ {
        proxy_pass http://auth_service/QuickConnect/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # API Key management (requires auth - passed through)
    location /Auth/ApiKey {
        proxy_pass http://auth_service/Auth/ApiKey;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
    }
    
    # === USER SERVICE (TODO) ===
    location /Users/ {
        # Proxy to C# for now, will switch to user-service when implemented
        proxy_pass http://jellyfin_csharp/Users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
    }
    
    # === LIBRARY SERVICE (TODO) ===
    location /Items {
        # Proxy to C# for now, will switch to library-service when implemented
        proxy_pass http://jellyfin_csharp/Items;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
    }
    
    location /Library/ {
        proxy_pass http://jellyfin_csharp/Library/;
        proxy_set_header Host $host;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
    }
    
    location /Genres/ {
        proxy_pass http://jellyfin_csharp/Genres/;
        proxy_set_header Host $host;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
    }
    
    # === MEDIA SERVICE (TODO) ===
    location /MediaInfo {
        proxy_pass http://jellyfin_csharp/MediaInfo;
        proxy_set_header Host $host;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
    }
    
    location /Items/ { alias /usr/share/jellyfin-media/; }  # Placeholder
    
    # === STREAM SERVICE (TODO) ===
    location /Videos/ {
        # Proxy to C# for now, will switch to stream-service when implemented
        proxy_pass http://jellyfin_csharp/Videos/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
    }
    
    location /Audio/ {
        proxy_pass http://jellyfin_csharp/Audio/;
        proxy_set_header Host $host;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
    }
    
    # === SESSION SERVICE (TODO) ===
    location /Sessions {
        proxy_pass http://jellyfin_csharp/Sessions;
        proxy_set_header Host $host;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
    }
    
    location /Devices {
        proxy_pass http://jellyfin_csharp/Devices;
        proxy_set_header Host $host;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
    }
    
    # === WEBSOCKET (TODO) ===
    location /ws {
        proxy_pass http://jellyfin_csharp/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    
    # FALLBACK: All other endpoints proxy to C# server
    # (Remove these as services are implemented)
    location / {
        proxy_pass http://jellyfin_csharp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Emby-Authorization $http_x_emby_authorization;
        proxy_set_header Accept-Encoding "";  # Disable compression for debugging
    }
}
